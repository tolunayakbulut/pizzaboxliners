name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env
        run: |
          cat > .env << EOF
          CI_ENVIRONMENT = production

          app.baseURL = 'https://pizzaboxliners.net/'

          database.default.hostname = localhost
          database.default.database = tolunay2_pizzaboxliners
          database.default.username = tolunay2_pizzaboxliners
          database.default.password = ${{ secrets.DB_PASSWORD }}
          database.default.DBDriver = MySQLi
          database.default.port     = 3306

          email.protocol   = smtp
          email.SMTPHost   = manto.veridyen.com
          email.SMTPUser   = noreply@pizzaboxliners.net
          email.SMTPPass   = ${{ secrets.SMTP_PASS }}
          email.SMTPPort   = 465
          email.SMTPCrypto = ssl
          email.fromEmail  = noreply@pizzaboxliners.net
          email.fromName   = "Pizza Box Liners"

          encryption.key = ${{ secrets.ENCRYPTION_KEY }}
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: manto.veridyen.com
          port: 21
          username: tolunay2
          password: ${{ secrets.FTP_PASSWORD }}
          security: loose
          server-dir: pizzaboxliners.net/
          exclude: |
            **/.git*
            **/.git*/**
            **/writable/logs/**
            **/writable/cache/**
            **/writable/session/**
            **/writable/uploads/**
            **/writable/debugbar/**
            deploy/**
