name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: manto.veridyen.com
          port: 21
          username: tolunay2
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: pizzaboxliners.net/
          exclude: |
            **/.git*
            **/.git*/**
            **/writable/logs/**
            **/writable/cache/**
            **/writable/session/**
            **/writable/uploads/**
            **/writable/debugbar/**
            deploy/**
